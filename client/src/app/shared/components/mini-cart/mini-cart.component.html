@if (cartService.totalItems() > 0) {
  <div class="w-full animate-in fade-in slide-in-from-bottom-4 duration-300 pointer-events-none">
    <div class="pointer-events-auto bg-white/60 dark:bg-[#1c1c1e]/60 backdrop-blur-xl rounded-[1.2rem] p-1 shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-white/40 dark:border-white/10 flex items-center justify-between h-12">
      
      <!-- Delivery Time Selection -->
      <ion-button (click)="openDeliveryModal()" fill="clear" mode="ios" class="ion-no-margin h-full" style="--padding-start: 4px; --padding-end: 8px;">
        <div class="flex items-center gap-2 h-full">
          <div class="w-8 h-8 rounded-full bg-[#ff6b35]/10 flex items-center justify-center text-[#ff6b35] shrink-0">
             <ion-icon name="time" class="text-lg"></ion-icon>
          </div>
          <div class="flex flex-col items-start text-left">
             <span class="text-[9px] text-gray-500 font-black uppercase tracking-wider leading-none mb-0.5">Доставка</span>
             <span class="text-xs font-black text-gray-900 dark:text-white leading-none flex items-center gap-0.5">
               {{ cartService.deliveryDay() }}, {{ cartService.deliveryTime() }}
               <ion-icon name="chevron-down" class="text-[10px] text-[#ff6b35]"></ion-icon>
             </span>
          </div>
        </div>
      </ion-button>

      <!-- Cart Button -->
      <ion-button routerLink="/cart" mode="ios" class="ion-no-margin h-9 mr-0.5 font-black text-sm" 
                  style="--background: #ff6b35; --color: white; --border-radius: 0.75rem; --box-shadow: 0 4px 10px rgba(255, 107, 53, 0.3);">
         <ion-icon slot="start" name="cart" class="text-lg"></ion-icon>
         {{ cartService.totalPrice() }} с.
      </ion-button>
    
    </div>
  </div>
}
