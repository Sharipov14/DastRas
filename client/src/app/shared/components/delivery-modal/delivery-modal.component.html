<ion-header class="ion-no-border pt-safe bg-white dark:bg-black">
    <ion-toolbar class="px-2">
        <ion-title class="font-black text-xl">Время доставки</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="closeModal()" class="ion-no-margin">
                <div class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-white/10 flex items-center justify-center transition-transform active:scale-90">
                    <ion-icon name="close" class="text-xl text-gray-900 dark:text-white"></ion-icon>
                </div>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="bg-white dark:bg-black">
    <div class="px-5 flex flex-col gap-8 pb-12 pt-4">

        <!-- Day Selection -->
        <div>
            <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Выберите день</h3>
            <ion-segment [value]="selectedDay()" (ionChange)="onDayChange($event)" mode="ios">
                @for (day of days; track day.value) {
                    <ion-segment-button [value]="day.value">
                        <ion-label class="font-bold">{{ day.label }}</ion-label>
                    </ion-segment-button>
                }
            </ion-segment>
        </div>

        <!-- Time Slots Selection -->
        <div>
            <h3 class="text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Доступные интервалы</h3>

            <ion-radio-group [value]="selectedTime()" (ionChange)="onTimeChange($event)">
                <ion-list class="bg-transparent ion-no-padding flex flex-col gap-3">
                    @for (slot of timeSlots; track slot) {
                        <ion-item lines="none" class="payment-item-native" [class.active]="selectedTime() === slot">
                            <div class="w-full flex items-center justify-between py-1">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-full flex items-center justify-center transition-colors shrink-0"
                                        [class]="selectedTime() === slot ? 'bg-orange-500/10 text-[#ff6b35]' : 'bg-gray-100 dark:bg-white/5 text-gray-400'">
                                        <ion-icon name="time-outline" class="text-2xl"></ion-icon>
                                    </div>
                                    <ion-label class="font-black text-gray-900 dark:text-white text-lg">{{ slot }}</ion-label>
                                </div>
                                <ion-radio slot="end" [value]="slot" mode="md"></ion-radio>
                            </div>
                        </ion-item>
                    }
                </ion-list>
            </ion-radio-group>
        </div>

    </div>
</ion-content>

<ion-footer class="ion-no-border bg-white dark:bg-black p-5 pb-safe border-t border-gray-100 dark:border-white/5 shadow-xl">
    <ion-button (click)="confirm()" expand="block" color="primary" class="h-14 font-black ion-no-margin">
        Готово
    </ion-button>
</ion-footer>
