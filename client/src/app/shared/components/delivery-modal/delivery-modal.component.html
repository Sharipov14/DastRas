<ion-header class="ion-no-border">
    <ion-toolbar class="px-2">
        <ion-title class="font-extrabold text-xl">Время доставки</ion-title>
        <ion-buttons slot="end">
            <button (click)="closeModal()" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/10 flex items-center justify-center active:scale-90 transition-transform">
                <ion-icon name="close" class="text-xl text-gray-900 dark:text-white"></ion-icon>
            </button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="ion-padding bg-white dark:bg-black">
    <div class="flex flex-col gap-6 pb-12">

        <!-- Day Selection -->
        <div>
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3 px-1">Выберите день</h3>
            <ion-segment [value]="selectedDay()" (ionChange)="onDayChange($event)" mode="ios" class="custom-segment">
                @for (day of days; track day.value) {
                    <ion-segment-button [value]="day.value">
                        <ion-label class="font-bold">{{ day.label }}</ion-label>
                    </ion-segment-button>
                }
            </ion-segment>
        </div>

        <!-- Time Slots Selection -->
        <div>
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3 px-1">Доступные интервалы</h3>

            <ion-radio-group [value]="selectedTime()" (ionChange)="onTimeChange($event)">
                <div class="flex flex-col gap-2">
                    @for (slot of timeSlots; track slot) {
                        <div class="relative">
                            <ion-item lines="none" 
                                class="rounded-2xl transition-all duration-200 border border-gray-100 dark:border-white/5"
                                [class.active-slot]="selectedTime() === slot">
                                <div class="flex items-center gap-3 w-full py-1">
                                    <div class="w-10 h-10 rounded-full flex items-center justify-center"
                                        [class]="selectedTime() === slot ? 'bg-orange-500/10 text-[#ff6b35]' : 'bg-gray-50 dark:bg-white/5 text-gray-400'">
                                        <ion-icon name="time-outline" class="text-xl"></ion-icon>
                                    </div>
                                    <ion-label class="font-bold text-gray-900 dark:text-white">{{ slot }}</ion-label>
                                    <ion-radio [value]="slot" slot="end" class="custom-radio"></ion-radio>
                                </div>
                            </ion-item>
                            @if (selectedTime() === slot) {
                                <div class="absolute -right-1 -top-1">
                                    <ion-icon name="checkmark-circle" class="text-[#ff6b35] text-xl bg-white dark:bg-black rounded-full"></ion-icon>
                                </div>
                            }
                        </div>
                    }
                </div>
            </ion-radio-group>
        </div>

    </div>
</ion-content>

<ion-footer class="ion-no-border bg-white dark:bg-black p-6 pb-safe">
    <button (click)="confirm()" 
        class="w-full h-14 bg-[#ff6b35] text-white rounded-full font-bold text-lg shadow-lg shadow-orange-500/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
        <span>Готово</span>
    </button>
</ion-footer>
