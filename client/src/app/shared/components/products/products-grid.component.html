<div class="grid grid-cols-2 gap-4 px-5">
    @if (isLoading) {
        @for (item of skeletonItems; track item) {
            <div class="bg-white dark:bg-[#1c1c1e] rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none flex flex-col h-full">
                <div class="w-full aspect-square rounded-[1.5rem] overflow-hidden mb-3 p-3">
                    <ion-skeleton-text animated class="skeleton-block skeleton-image"></ion-skeleton-text>
                </div>
                <div class="px-3 pb-3 flex flex-col flex-1 gap-2">
                    <ion-skeleton-text animated class="skeleton-block skeleton-title"></ion-skeleton-text>
                    <ion-skeleton-text animated class="skeleton-block skeleton-subtitle"></ion-skeleton-text>
                    <div class="mt-auto flex items-center justify-between">
                        <ion-skeleton-text animated class="skeleton-block skeleton-price"></ion-skeleton-text>
                        <ion-skeleton-text animated class="skeleton-block skeleton-action"></ion-skeleton-text>
                    </div>
                </div>
            </div>
        }
    } @else {
        @for (product of products(); track product.id) {
            <app-product-card [product]="product"></app-product-card>
        }
        @empty {
            <div class="col-span-2 py-10 text-center">
                <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">Товары не найдены.</p>
            </div>
        }
    }
</div>
