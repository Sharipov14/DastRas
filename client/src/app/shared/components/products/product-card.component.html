<div class="bg-white dark:bg-[#1c1c1e] rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-none flex flex-col h-full active:scale-[0.98] transition-all duration-200 cursor-pointer"
    (click)="goToDetails()">

    <!-- Image Section -->
    <div class="relative w-full aspect-square rounded-[1.5rem] overflow-hidden bg-gray-100 dark:bg-gray-900 mb-3">
        <img [src]="product.imageUrl" class="w-full h-full object-cover" [alt]="product.nameRu">

        <!-- Rating Badge -->
        <div class="absolute top-2.5 right-2.5 bg-white/80 dark:bg-black/60 backdrop-blur-md px-2 py-1 rounded-full text-[10px] font-black flex items-center gap-1 shadow-sm dark:text-white">
            <ion-icon name="star" class="text-yellow-400 text-xs"></ion-icon> {{ product.rating }}
        </div>
    </div>

    <!-- Product Details -->
    <div class="px-3 pb-3 flex flex-col flex-1">
        <div class="mb-1">
            <h3 class="font-bold text-gray-900 dark:text-white text-[15px] leading-tight line-clamp-2">
                {{ product.nameRu }}
            </h3>
        </div>
        <p class="text-xs text-gray-400 dark:text-gray-500 mb-3 font-bold">{{ product.unit }}</p>

        <!-- Quantity and Price -->
        <div class="mt-auto flex items-center justify-between">
            <span class="font-black text-lg text-gray-900 dark:text-white">
                {{ product.price }} <span class="text-[#ff6b35] text-sm">c.</span>
            </span>

            @if (quantity === 0) {
                <ion-button 
                    (click)="addToCart($event)"
                    mode="ios"
                    class="ion-no-margin h-9 w-9"
                    style="--padding-start: 0; --padding-end: 0; --background: #111827; --color: white; --border-radius: 50%;">
                    <ion-icon slot="icon-only" name="add" class="text-xl"></ion-icon>
                </ion-button>
            } @else {
                <div class="flex items-center bg-[#ff6b35] rounded-full h-9 px-1 shadow-lg shadow-orange-500/30"
                    (click)="$event.stopPropagation()">
                    <button class="w-8 h-full flex items-center justify-center text-white active:opacity-70"
                        (click)="updateQuantity($event, -1)">
                        <ion-icon [name]="quantity === 1 ? 'trash-outline' : 'remove'"
                            class="text-lg">
                        </ion-icon>
                    </button>
                    <span class="text-sm font-black mx-0.5 min-w-[14px] text-center text-white">
                        {{ quantity }}
                    </span>
                    <button class="w-8 h-full flex items-center justify-center text-white active:opacity-70"
                        (click)="updateQuantity($event, 1)">
                        <ion-icon name="add" class="text-lg"></ion-icon>
                    </button>
                </div>
            }
        </div>
    </div>
</div>
