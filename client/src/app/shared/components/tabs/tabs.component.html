<ion-tabs>
  <!-- Sticky Mini Cart Block (Floating above tabs) -->
  <div class="w-full px-5 pb-1 z-50">
    <app-mini-cart></app-mini-cart>
  </div>

  <ion-tab-bar slot="bottom" class="tabs-safe bg-white/80 dark:bg-black/80 backdrop-blur-xl border-t border-white/20 dark:border-white/10 shadow-[0_-5px_20px_rgba(0,0,0,0.02)]">
    <ion-tab-button tab="home">
      <ion-icon name="home"></ion-icon>
      <ion-label>Главная</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="categories">
      <ion-icon name="grid"></ion-icon>
      <ion-label>Каталог</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="orders">
      <ion-icon name="receipt"></ion-icon>
      <ion-label>Заказы</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="profile">
      <ion-icon name="person"></ion-icon>
      <ion-label>Профиль</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
