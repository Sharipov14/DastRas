<ion-header class="ion-no-border">
  <!-- Top bar with Back and Title -->
  <ion-toolbar class="px-2">
    <ion-buttons slot="start">
      <ion-button (click)="dismiss()">
        <ion-icon name="arrow-back" class="text-gray-900 dark:text-white text-xl"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="font-extrabold text-xl">Поиск</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" class="text-sm font-bold text-[#ff6b35]">
        Отмена
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <!-- Searchbar on its own line below the header title -->
  <ion-toolbar class="px-5 pb-2">
    <ion-searchbar 
      #searchbar
      [value]="searchQuery()"
      placeholder="Найти продукты..." 
      class="custom-search p-0"
      (ionInput)="onSearch($event)"
      [debounce]="300"
      show-cancel-button="never"
      [animated]="true">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-white dark:bg-black ion-padding">
  <div class="animate-fade-in-up">
    <!-- Recommendations: Shown only when query is empty -->
    @if (!searchQuery()) {
      <div class="mt-4 mb-8">
        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 px-1">Рекомендуем</h3>
        <div class="flex flex-wrap gap-2">
          @for (tag of recommendations; track tag) {
            <ion-chip 
              (click)="selectRecommendation(tag)"
              class="bg-gray-100 dark:bg-white/5 text-gray-800 dark:text-gray-200 shadow-none m-0 px-4 py-2.5 h-auto rounded-xl active:scale-95 transition-transform border-none">
              <ion-label class="text-sm font-bold">{{ tag }}</ion-label>
            </ion-chip>
          }
        </div>
      </div>
    }

    <!-- Search Results Grid -->
    <div class="mt-4 pb-10">
      @if (searchQuery()) {
        <div class="flex items-center justify-between mb-4 px-1">
          <h3 class="text-lg font-extrabold text-gray-900 dark:text-white">
            Результаты поиска
          </h3>
          <span class="text-xs font-bold text-[#ff6b35] bg-orange-500/10 px-2 py-1 rounded-lg">
            "{{ searchQuery() }}"
          </span>
        </div>
      } @else {
        <h3 class="text-lg font-extrabold text-gray-900 dark:text-white mb-4 px-1">
          Популярные товары
        </h3>
      }

      <!-- Reusing the Products Grid -->
      <app-products-grid></app-products-grid>
    </div>
  </div>
</ion-content>
