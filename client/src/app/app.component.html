<ion-app>
    <!-- Splash Screen -->
    @if (isAppLoading()) {
        <div class="fixed inset-0 z-[100000] flex flex-col items-center justify-center bg-white dark:bg-black transition-opacity duration-500">
            <div class="flex flex-col items-center animate-pulse-slow">
                <!-- App Logo Placeholder -->
                <div class="w-24 h-24 bg-gradient-to-br from-[#ff6b35] to-[#ff8c42] rounded-[2.5rem] shadow-2xl shadow-orange-500/40 flex items-center justify-center mb-6">
                    <span class="text-5xl">🛍️</span>
                </div>
                <h1 class="text-4xl font-black tracking-tighter text-gray-900 dark:text-white">
                    Dast<span class="text-[#ff6b35]">Ras</span>
                </h1>
                <p class="mt-2 text-sm font-bold text-gray-400 uppercase tracking-widest">Доставка продуктов</p>
            </div>
            
            <!-- Bottom Loader -->
            <div class="absolute bottom-16 flex flex-col items-center">
                <div class="w-12 h-1 bg-gray-100 dark:bg-white/10 rounded-full overflow-hidden">
                    <div class="h-full bg-[#ff6b35] animate-progress-fast"></div>
                </div>
            </div>
        </div>
    }

    <!-- Global Loading Overlay for slow connections -->
    <ion-loading 
        [isOpen]="isNavigating()" 
        message="Загрузка..."
        spinner="crescent"
        class="custom-loading">
    </ion-loading>

    <ion-router-outlet></ion-router-outlet>
</ion-app>
