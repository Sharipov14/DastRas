<ion-header class="ion-no-border pt-safe bg-white dark:bg-black">
  <ion-toolbar class="px-2">
    <ion-title class="font-extrabold text-xl">Каталог</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg-white dark:bg-black">
  <div class="px-5">
    <!-- Header with transition for condensed mode -->
    <ion-header collapse="condense" class="ion-no-border mb-4">
      <ion-toolbar>
        <ion-title size="large" class="font-extrabold p-0">Каталог</ion-title>
      </ion-toolbar>
    </ion-header>

    <!-- Search Placeholder: Opens the Page -->
    <ion-item
      button="true"
      detail="false"
      lines="none"
      class="mt-4 mb-6 bg-gray-100 dark:bg-white/10 rounded-2xl text-gray-400 active:scale-[0.98] transition-transform"
      style="--background: transparent; --background-activated: transparent; --background-focused: transparent; --background-hover: transparent; --padding-start: 0; --inner-padding-end: 0; --min-height: auto; --ripple-color: transparent;"
      (click)="goToSearch()">
      <div class="w-full p-4 flex items-center gap-3">
        <ion-icon name="search" class="text-xl"></ion-icon>
        <span class="text-base font-medium">Поиск продуктов...</span>
      </div>
    </ion-item>

    <!-- Info text -->
    <div class="mb-4">
      <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-1">Категории</h2>
      <p class="text-sm font-bold text-gray-500">Выберите интересующий вас раздел</p>
    </div>

    <!-- Categories Grid -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        @for (cat of categories(); track cat.id) {
          <ion-card
            button="true"
            (click)="selectCategory(cat.id)"
            class="ion-no-margin h-40 flex flex-col items-center justify-center transition-all duration-300 active:scale-95 rounded-3xl bg-gray-100 dark:bg-white/5 border-none shadow-none"
            style="--background: transparent; --color: currentColor;">
            <ion-card-content class="h-full w-full flex flex-col items-center justify-center ion-no-padding">
              <span class="text-5xl leading-none mb-4 drop-shadow-sm">{{ cat.emoji }}</span>
              <span class="text-gray-900 dark:text-white font-black text-base text-center px-2">
                  {{ cat.name }}
              </span>
            </ion-card-content>
          </ion-card>
        }
    </div>

    <!-- All Products card -->
    <ion-card
      button="true"
      (click)="selectCategory(0)"
      class="ion-no-margin mt-2 rounded-3xl bg-gradient-to-r from-[#ff6b35] to-[#ff9e7d] text-white shadow-xl shadow-orange-500/20 active:scale-[0.98] transition-all mb-24"
      style="--background: transparent; --color: white;">
      <ion-card-content class="p-6 flex items-center justify-between">
        <div>
          <h3 class="text-xl font-black">Все продукты</h3>
          <p class="text-white/80 font-bold text-sm">Весь ассортимент магазина</p>
        </div>
        <span class="text-5xl">🛒</span>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
