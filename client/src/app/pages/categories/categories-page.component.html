<ion-header class="ion-no-border pt-safe bg-white dark:bg-black">
  <ion-toolbar class="px-2">
    <ion-title class="font-extrabold text-xl">Каталог</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="bg-white dark:bg-black">
  <div class="px-5">
    <!-- Header with transition for condensed mode -->
    <ion-header collapse="condense" class="ion-no-border mb-4">
      <ion-toolbar>
        <ion-title size="large" class="font-extrabold p-0">Каталог</ion-title>
      </ion-toolbar>
    </ion-header>

    <!-- Search Placeholder: Opens the Page -->
    <div class="mt-4 mb-6 active:scale-[0.98] transition-transform" (click)="goToSearch()">
      <div class="bg-gray-100 dark:bg-white/10 p-4 rounded-2xl flex items-center gap-3 text-gray-400">
        <ion-icon name="search" class="text-xl"></ion-icon>
        <span class="text-base font-medium">Поиск продуктов...</span>
      </div>
    </div>

    <!-- Info text -->
    <div class="mb-4">
      <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-1">Категории</h2>
      <p class="text-sm font-bold text-gray-500">Выберите интересующий вас раздел</p>
    </div>

    <!-- Categories Grid -->
    <div class="grid grid-cols-2 gap-4 mb-6">
        @for (cat of categories(); track cat.id) {
          <div 
            (click)="selectCategory(cat.id)"
            class="h-40 flex flex-col items-center justify-center transition-all duration-300 active:scale-95 rounded-3xl bg-gray-100 dark:bg-white/5 border-none">
            <span class="text-5xl leading-none mb-4 drop-shadow-sm">{{ cat.emoji }}</span>
            <span class="text-gray-900 dark:text-white font-black text-base text-center px-2">
                {{ cat.name }}
            </span>
          </div>
        }
    </div>

    <!-- All Products card -->
    <div 
      (click)="selectCategory(0)"
      class="mt-2 p-6 rounded-3xl bg-gradient-to-r from-[#ff6b35] to-[#ff9e7d] text-white shadow-xl shadow-orange-500/20 active:scale-[0.98] transition-all flex items-center justify-between mb-24">
      <div>
        <h3 class="text-xl font-black">Все продукты</h3>
        <p class="text-white/80 font-bold text-sm">Весь ассортимент магазина</p>
      </div>
      <span class="text-5xl">🛒</span>
    </div>
  </div>
</ion-content>
