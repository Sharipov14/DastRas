<ion-header class="ion-no-border pt-safe bg-white dark:bg-black">
    <ion-toolbar class="px-2">
        <ion-buttons slot="start">
            <ion-button (click)="goBack()" color="dark">
                <ion-icon name="arrow-back" class="text-2xl"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title class="text-xl font-black">Редактирование</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="bg-white dark:bg-black">
    <div class="px-5 pb-32">
        
        <!-- Avatar Edit -->
        <div class="flex flex-col items-center mt-6 mb-10">
            <div class="relative">
                <div class="w-24 h-24 rounded-[2rem] overflow-hidden border-4 border-orange-100 dark:border-orange-500/20 shadow-lg">
                    <img [src]="user().avatar" class="w-full h-full object-cover">
                </div>
                <button class="absolute -bottom-2 -right-2 w-10 h-10 bg-[#ff6b35] rounded-full text-white flex items-center justify-center shadow-lg border-2 border-white dark:border-black transition-transform active:scale-95">
                    <ion-icon name="pencil" class="text-lg"></ion-icon>
                </button>
            </div>
        </div>

        <!-- Form -->
        <form [formGroup]="profileForm" (ngSubmit)="save()" class="space-y-6">
            
            <div class="form-group">
                <ion-label class="text-sm font-bold text-gray-500 ml-4 mb-2 block uppercase tracking-wider">Имя</ion-label>
                <ion-item lines="none" class="input-item">
                    <ion-input formControlName="firstName" type="text" placeholder="Введите имя"></ion-input>
                </ion-item>
                <div *ngIf="profileForm.get('firstName')?.invalid && profileForm.get('firstName')?.touched" class="text-red-500 text-xs font-bold ml-4 mt-2">
                    Пожалуйста, введите корректное имя.
                </div>
            </div>

            <div class="form-group">
                <ion-label class="text-sm font-bold text-gray-500 ml-4 mb-2 block uppercase tracking-wider">Фамилия</ion-label>
                <ion-item lines="none" class="input-item">
                    <ion-input formControlName="lastName" type="text" placeholder="Введите фамилию"></ion-input>
                </ion-item>
                <div *ngIf="profileForm.get('lastName')?.invalid && profileForm.get('lastName')?.touched" class="text-red-500 text-xs font-bold ml-4 mt-2">
                    Пожалуйста, введите корректную фамилию.
                </div>
            </div>

            <div class="form-group">
                <ion-label class="text-sm font-bold text-gray-500 ml-4 mb-2 block uppercase tracking-wider">Номер телефона</ion-label>
                <ion-item lines="none" class="input-item">
                    <ion-input formControlName="phone" type="tel" placeholder="+992 000 00 00 00"></ion-input>
                </ion-item>
                <div *ngIf="profileForm.get('phone')?.invalid && profileForm.get('phone')?.touched" class="text-red-500 text-xs font-bold ml-4 mt-2">
                    Пожалуйста, введите корректный номер телефона.
                </div>
            </div>

        </form>

    </div>
</ion-content>

<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 right-0 p-5 bg-white/80 dark:bg-black/80 backdrop-blur-lg pb-safe border-t border-gray-100 dark:border-white/5 z-50">
    <ion-button (click)="save()" expand="block" color="primary" class="h-14 text-lg font-black shadow-lg shadow-orange-500/20">
        Сохранить изменения
    </ion-button>
</div>
