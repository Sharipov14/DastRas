<ion-header class="ion-no-border pt-safe bg-white dark:bg-black">
    <ion-toolbar class="px-2">
        <ion-title class="text-xl font-black">Профиль</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="bg-white dark:bg-black">
    <div class="px-5 pb-32">
        
        <!-- User Info -->
        <div (click)="navigateTo('/profile/edit')" class="flex items-center gap-4 mt-6 mb-8 active:opacity-60 transition-opacity cursor-pointer">
            <div class="w-20 h-20 rounded-[2rem] overflow-hidden border-4 border-orange-100 dark:border-orange-500/20 shadow-lg">
                <img [src]="user().avatar" class="w-full h-full object-cover">
            </div>
            <div class="flex-1">
                <h2 class="text-xl font-black text-gray-900 dark:text-white mb-0.5">{{ user().name }}</h2>
                <p class="text-sm font-bold text-gray-400">{{ user().phone }}</p>
                <div class="flex items-center gap-1 mt-1 font-black text-[#ff6b35] uppercase tracking-widest text-[10px]">
                    Редактировать
                    <ion-icon name="chevron-forward-outline"></ion-icon>
                </div>
            </div>
        </div>

        <!-- Wallet Card -->
        <div class="bg-gradient-to-br from-gray-900 to-black dark:from-[#1c1c1e] dark:to-black rounded-[2.5rem] p-6 mb-10 shadow-2xl relative overflow-hidden">
            <div class="relative z-10 flex flex-col h-full">
                <div class="flex items-center gap-2 mb-4 opacity-60">
                    <ion-icon name="wallet-outline" class="text-white text-lg"></ion-icon>
                    <span class="text-xs font-bold text-white uppercase tracking-[0.2em]">DastRas Кошелек</span>
                </div>
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-3xl font-black text-white leading-none mb-1">
                            {{ user().balance }} <span class="text-lg font-bold">сом</span>
                        </p>
                        <p class="text-[10px] font-bold text-orange-400 uppercase tracking-widest">Доступный баланс</p>
                    </div>
                    <ion-button size="small" color="primary" class="font-black text-xs px-4">
                        Пополнить
                    </ion-button>
                </div>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-orange-500/10 rounded-full blur-3xl"></div>
        </div>

        <!-- Menu Groups -->
        <div class="space-y-6">
            
            <!-- Group 1: Account -->
            <div class="menu-group">
                <ion-item (click)="navigateTo('/addresses')" button detail="false" class="menu-item-native">
                    <div slot="start" class="menu-icon-wrapper bg-orange-50 dark:bg-orange-500/10 text-[#ff6b35]">
                        <ion-icon name="location-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-bold">Мои адреса</ion-label>
                    <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                </ion-item>
                
                <div class="menu-item-divider"></div>

                <ion-item button detail="false" class="menu-item-native">
                    <div slot="start" class="menu-icon-wrapper bg-orange-50 dark:bg-orange-500/10 text-[#ff6b35]">
                        <ion-icon name="card-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-bold">Способы оплаты</ion-label>
                    <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                </ion-item>
                
                <div class="menu-item-divider"></div>

                <ion-item (click)="navigateTo('/notifications')" button detail="false" class="menu-item-native" lines="none">
                    <div slot="start" class="menu-icon-wrapper bg-orange-50 dark:bg-orange-500/10 text-[#ff6b35]">
                        <ion-icon name="notifications-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-bold">Уведомления</ion-label>
                    <ion-badge slot="end" color="danger">2</ion-badge>
                    <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                </ion-item>            </div>

            <!-- Group 2: Settings -->
            <div class="menu-group">
                <ion-item button detail="false" class="menu-item-native" (click)="toggleTheme(!themeService.isDark())">
                    <div slot="start" class="menu-icon-wrapper bg-orange-50 dark:bg-orange-500/10 text-[#ff6b35]">
                        <ion-icon name="moon-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-bold">Темная тема</ion-label>
                    <ion-toggle slot="end" [checked]="themeService.isDark()" mode="ios" color="primary" class="pointer-events-none"></ion-toggle>
                </ion-item>
                
                <div class="menu-item-divider"></div>

                <ion-item button detail="false" class="menu-item-native" lines="none">
                    <div slot="start" class="menu-icon-wrapper bg-orange-50 dark:bg-orange-500/10 text-[#ff6b35]">
                        <ion-icon name="language-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-bold">Язык приложения</ion-label>
                    <ion-note slot="end" class="text-xs font-bold mr-2">Русский</ion-note>
                    <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                </ion-item>
            </div>

            <!-- Group 3: Support -->
            <div class="menu-group">
                <ion-item button detail="false" class="menu-item-native" lines="none">
                    <div slot="start" class="menu-icon-wrapper bg-orange-50 dark:bg-orange-500/10 text-[#ff6b35]">
                        <ion-icon name="help-circle-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-bold">Служба поддержки</ion-label>
                    <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
                </ion-item>
            </div>

            <!-- Group 4: Logout -->
            <div class="menu-group logout-group">
                <ion-item (click)="logout()" button detail="false" class="menu-item-native" lines="none">
                    <div slot="start" class="menu-icon-wrapper bg-red-50 dark:bg-red-500/10 text-red-500">
                        <ion-icon name="log-out-outline"></ion-icon>
                    </div>
                    <ion-label class="menu-label font-black text-red-500">Выйти из аккаунта</ion-label>
                </ion-item>
            </div>

        </div>

    </div>
</ion-content>
