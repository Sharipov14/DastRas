<ion-header class="ion-no-border pt-safe bg-white dark:bg-black">
    <ion-toolbar class="px-2">
        <ion-title class="text-xl font-black">Профиль</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content class="bg-white dark:bg-black">
    <div class="px-5 pb-32">
        
        <!-- User Info -->
        <div class="flex items-center gap-4 mt-6 mb-8">
            <div class="w-20 h-20 rounded-[2rem] overflow-hidden border-4 border-orange-100 dark:border-orange-500/20 shadow-lg">
                <img [src]="user().avatar" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 class="text-xl font-black text-gray-900 dark:text-white mb-0.5">{{ user().name }}</h2>
                <p class="text-sm font-bold text-gray-400">{{ user().phone }}</p>
                <ion-button fill="clear" size="small" class="ion-no-padding h-auto mt-1 font-black text-[#ff6b35] uppercase tracking-widest text-[10px]">
                    Редактировать
                    <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
                </ion-button>
            </div>
        </div>

        <!-- Wallet Card -->
        <div class="bg-gradient-to-br from-gray-900 to-black dark:from-[#1c1c1e] dark:to-black rounded-[2.5rem] p-6 mb-8 shadow-2xl relative overflow-hidden">
            <div class="relative z-10 flex flex-col h-full">
                <div class="flex items-center gap-2 mb-4 opacity-60">
                    <ion-icon name="wallet-outline" class="text-white text-lg"></ion-icon>
                    <span class="text-xs font-bold text-white uppercase tracking-[0.2em]">DastRas Кошелек</span>
                </div>
                <div class="flex items-end justify-between">
                    <div>
                        <p class="text-3xl font-black text-white leading-none mb-1">
                            {{ user().balance }} <span class="text-lg font-bold">сом</span>
                        </p>
                        <p class="text-[10px] font-bold text-orange-400 uppercase tracking-widest">Доступный баланс</p>
                    </div>
                    <ion-button size="small" color="primary" class="font-black text-xs px-4">
                        Пополнить
                    </ion-button>
                </div>
            </div>
            <!-- Decorative circle -->
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-orange-500/10 rounded-full blur-3xl"></div>
        </div>

        <!-- Menu List -->
        <ion-list class="bg-transparent ion-no-padding">
            
            <ion-item (click)="navigateTo('/addresses')" button detail="false" class="menu-item-native">
                <div slot="start" class="menu-icon-wrapper bg-gray-100 dark:bg-white/10 text-gray-500">
                    <ion-icon name="location-outline"></ion-icon>
                </div>
                <ion-label class="menu-label">Мои адреса</ion-label>
                <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
            </ion-item>

            <ion-item button detail="false" class="menu-item-native">
                <div slot="start" class="menu-icon-wrapper bg-gray-100 dark:bg-white/10 text-gray-500">
                    <ion-icon name="card-outline"></ion-icon>
                </div>
                <ion-label class="menu-label">Способы оплаты</ion-label>
                <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
            </ion-item>

            <ion-item button detail="false" class="menu-item-native">
                <div slot="start" class="menu-icon-wrapper bg-gray-100 dark:bg-white/10 text-gray-500">
                    <ion-icon name="notifications-outline"></ion-icon>
                </div>
                <ion-label class="menu-label">Уведомления</ion-label>
                <ion-badge slot="end" color="danger">2</ion-badge>
                <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
            </ion-item>

            <div class="h-[1px] bg-gray-100 dark:bg-white/5 my-2 mx-4"></div>

            <!-- Theme Toggle -->
            <ion-item lines="none" class="menu-item-native">
                <div slot="start" class="menu-icon-wrapper bg-gray-100 dark:bg-white/10 text-gray-500">
                    <ion-icon name="moon-outline"></ion-icon>
                </div>
                <ion-label class="menu-label">Темная тема</ion-label>
                <ion-toggle slot="end" [checked]="themeService.isDark()" (ionChange)="toggleTheme($event)" mode="ios" color="primary"></ion-toggle>
            </ion-item>

            <ion-item button detail="false" class="menu-item-native">
                <div slot="start" class="menu-icon-wrapper bg-gray-100 dark:bg-white/10 text-gray-500">
                    <ion-icon name="language-outline"></ion-icon>
                </div>
                <ion-label class="menu-label">Язык приложения</ion-label>
                <ion-note slot="end" class="text-xs font-bold">Русский</ion-note>
                <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
            </ion-item>

            <ion-item button detail="false" class="menu-item-native">
                <div slot="start" class="menu-icon-wrapper bg-gray-100 dark:bg-white/10 text-gray-500">
                    <ion-icon name="help-circle-outline"></ion-icon>
                </div>
                <ion-label class="menu-label">Служба поддержки</ion-label>
                <ion-icon slot="end" name="chevron-forward-outline" class="menu-arrow"></ion-icon>
            </ion-item>

            <ion-item (click)="logout()" button detail="false" class="menu-item-native mt-4" style="--color: #ef4444;">
                <div slot="start" class="menu-icon-wrapper bg-red-100 dark:bg-red-500/10 text-red-500">
                    <ion-icon name="log-out-outline"></ion-icon>
                </div>
                <ion-label class="menu-label font-black">Выйти из аккаунта</ion-label>
            </ion-item>

        </ion-list>

    </div>
</ion-content>
