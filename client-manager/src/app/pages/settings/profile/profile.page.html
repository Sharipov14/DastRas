<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/settings"></ion-back-button>
    </ion-buttons>
    <ion-title>Редактировать профиль</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="px-5 py-8">
    <div class="flex flex-col items-center mb-8">
      <div class="relative">
        <ion-avatar class="w-24 h-24 border-4 border-primary/20 shadow-lg">
          <img [src]="formData.avatarUrl || 'https://ionicframework.com/docs/img/demos/avatar.svg'" />
        </ion-avatar>
        <div class="absolute bottom-0 right-0 bg-primary text-white p-1.5 rounded-full shadow-md border-2 border-white dark:border-black">
          <ion-icon name="camera-outline"></ion-icon>
        </div>
      </div>
    </div>

    <ion-list lines="none" class="bg-transparent">
      <div class="bg-white dark:bg-white/5 rounded-3xl p-4 border border-gray-100 dark:border-white/5 mb-6">
        <ion-item class="mb-2">
          <ion-icon name="person-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="stacked">Имя</ion-label>
          <ion-input type="text" [(ngModel)]="formData.name" placeholder="Введите ваше имя"></ion-input>
        </ion-item>

        <ion-item class="mb-2">
          <ion-icon name="call-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="stacked">Телефон</ion-label>
          <ion-input type="tel" [(ngModel)]="formData.phone" placeholder="+992 ..."></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="stacked">Новый пароль (оставьте пустым, если не хотите менять)</ion-label>
          <ion-input type="password" [(ngModel)]="formData.password" placeholder="••••••••"></ion-input>
        </ion-item>
      </div>
    </ion-list>

    <div class="mt-8">
      <ion-button expand="block" (click)="onSave()" class="h-14 text-lg font-bold ion-no-margin" shape="round">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Сохранить изменения
      </ion-button>
    </div>

    <p *ngIf="errorMessage()" class="text-red-500 text-center mt-4 font-medium">{{ errorMessage() }}</p>
  </div>

  <ion-loading [isOpen]="isLoading()" message="Сохранение..."></ion-loading>
  <ion-toast 
    [isOpen]="isSuccess()" 
    message="Профиль успешно обновлен" 
    [duration]="2000" 
    color="success"
    (didDismiss)="isSuccess.set(false)">
  </ion-toast>
</ion-content>
